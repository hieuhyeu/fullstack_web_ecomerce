
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Spring Boot backend
    location /api {
        proxy_pass http://be:8080/api;
      
    }

    # React Router: fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
